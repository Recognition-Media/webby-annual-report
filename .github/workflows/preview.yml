name: Preview Deploy

on:
  push:
    branches-ignore: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Get branch name
        id: branch
        run: echo "name=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: npm ci

      - name: Build with preview base path
        run: npm run build
        env:
          NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ secrets.SANITY_PROJECT_ID }}
          NEXT_PUBLIC_SANITY_DATASET: ${{ secrets.SANITY_DATASET }}
          SANITY_API_TOKEN: ${{ secrets.SANITY_API_TOKEN }}
          NEXT_PUBLIC_SIGNUP_API_URL: ${{ secrets.SIGNUP_API_URL }}
          PREVIEW_BASE_PATH: /preview/${{ steps.branch.outputs.name }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy to S3 preview folder
        run: aws s3 sync out/ s3://webbyawards-com-assets/preview/${{ steps.branch.outputs.name }}/ --exact-timestamps

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id E120I5KFQNYFYO --paths "/preview/${{ steps.branch.outputs.name }}/*"

      - name: Post preview URL
        run: echo "Preview URL — https://reports.webbyawards.com/preview/${{ steps.branch.outputs.name }}/"
